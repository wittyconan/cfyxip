<!DOCTYPE html>
<html lang="zh">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给站长留言</title>
    <script src="email.min.js"></script>
    <script>
    (function() {
        emailjs.init("uYWKzwYmqLtj0ACAK");
    })();
    </script>
    <script type="text/javascript">
        window.onload = function() {
            document.getElementById("feedbackForm").addEventListener("submit", function(event) {
                event.preventDefault();

                const submitButton = document.getElementById("sendmsg");
                const originalText = "立即提交反馈";
                submitButton.textContent = "发送中...";
                submitButton.disabled = true;

                const message = document.getElementById("message").value;
                const email = document.getElementById("email").value || "未填写";
                const nickname = document.getElementById("nickname").value || "匿名";

                emailjs.send("service_6emjbiy", "666", {
                    message: message,
                    email: email,
                    nickname: nickname
                }).then(function(response) {
                    alert("提交成功！感谢反馈！请等待管理员处理！");
                    document.getElementById("feedbackForm").reset();
                    submitButton.textContent = "发送成功";
                }, function(error) {
                    submitButton.textContent = "发送失败";
                    alert("提交失败，请稍后或明天再试！");
                    console.error("邮件发送失败", error);
                }).finally(() => {
                    setTimeout(() => {
                        submitButton.disabled = false;
                        if(submitButton.textContent !== "发送失败") {
                            submitButton.textContent = originalText;
                        }
                    }, 2000);
                });
            });
        }
    </script>
    <style>
        :root { 
            --bg-color: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7); 
            --accent-blue: #3b82f6; 
            --text-main: #f1f5f9; 
            --text-muted: #94a3b8; 
            --border-color: rgba(255, 255, 255, 0.08); 
            --input-bg: rgba(15, 23, 42, 0.6); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.18) 0%, transparent 600px); 
            background-repeat: no-repeat; 
            color: var(--text-main); 
            line-height: 1.6; 
            padding: 50px 20px; 
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 50px; }

        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 20px; 
            font-weight: 800; 
            letter-spacing: -0.02em; 
            background: linear-gradient(to right, #ffffff, var(--accent-blue)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        h2 { 
            font-size: 1.0rem; 
            margin-bottom: 25px; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            <!-- justify-content: center; -->
        }

        .group-card { 
            background-color: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 14px; 
            padding: 30px; 
            margin-bottom: 25px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
        }

        .input-group { margin-bottom: 20px; }
        
        .input-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        input, textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }

        button { 
            display: block;
            width: 100%;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(37, 99, 235, 0.8)); 
            color: #fff; 
            padding: 14px; 
            border-radius: 50px; 
            border: none;
            font-size: 1rem; 
            font-weight: 700; 
            cursor: pointer;
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); 
            margin-top: 10px;
        }

        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3); 
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .footer { 
            text-align: center; 
            margin-top: 50px; 
            padding-top: 30px; 
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .input-row { grid-template-columns: 1fr; }
            body { padding: 30px 15px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>给站长留言</h1>
        </header> 
        
        <div class="group-card">
            <h2>投稿项目、链接失效、问题反馈、意见建议</h2>
            <form id="feedbackForm">
                <div class="input-group">
                    <textarea id="message" name="message" rows="6" placeholder="在此输入..." required></textarea>
                </div>
                
                <div class="input-row">
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder="邮箱 (选填)">
                    </div>
                    <div class="input-group">
                        <input type="text" id="nickname" name="nickname" placeholder="昵称 (选填)">
                    </div>
                </div>

                <button type="submit" id="sendmsg">立即提交</button>
            </form>
        </div>

        <!-- <div class="footer"> -->
            <!-- <p>感谢您的反馈，管理员会尽快处理</p> -->
        <!-- </div> -->
    </div>
</body>
</html>
