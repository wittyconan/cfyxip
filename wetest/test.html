<!DOCTYPE html>
<html>
<head>
    <title>Loading Data...</title>
</head>
<body>
    <script>
        async function fetchAndPlain() {
            const urls = [
                'https://cf.090227.xyz/ct?ips=6',
                'https://cf.090227.xyz/cu?ips=6',
                'https://cf.090227.xyz/cmcc?ips=6'
            ];

            try {
                // 并发请求所有接口
                const results = await Promise.all(urls.map(url => 
                    fetch(url).then(res => res.text())
                ));

                // 拼接数据
                const plainText = results.join('\n');

                // 核心操作：将整个文档替换为纯文本
                // 这样用户在浏览器里“查看源代码”也只会看到这些 IP 文本
                document.open("text/plain");
                document.write(plainText);
                document.close();

            } catch (error) {
                document.open("text/plain");
                document.write("获取数据失败，请检查 CORS 跨域限制或网络连接。\n" + error);
                document.close();
            }
        }

        fetchAndPlain();
    </script>
</body>
</html>
