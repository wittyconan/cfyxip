name: Chain Starter
on:
  workflow_dispatch:
permissions:
  actions: write
jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Launch First Domino
        run: gh workflow run tiancheng.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}