name: gslege

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Process Data
        run: |
          mkdir -p gslege
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M")
          HAS_CHANGES=false
          
          URLS=(
            "https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Cfxyz.txt"
            "https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/JP.txt"
            "https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/NL.txt"
            "https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/US.txt"
            "https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/DE.txt"
            "https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/SG.txt"
          )

          for URL in "${URLS[@]}"; do
            FILENAME=$(basename "$URL")
            TARGET_FILE="gslege/$FILENAME"
            TMP_NEW="new_${FILENAME}.tmp"
            TMP_OLD="old_${FILENAME}.tmp"
            
            # --- 新增：地区标签识别逻辑 ---
            if [ "$FILENAME" = "Cfxyz.txt" ]; then
                REGION="Speed"
            else
                # 提取文件名（去掉 .txt）作为地区代码，并转换为大写
                REGION=$(echo "${FILENAME%.*}" | tr '[:lower:]' '[:upper:]')
            fi
            
            echo "正在处理: $FILENAME (地区: $REGION)"
            
            # 核心处理逻辑
            curl -sL "$URL" | awk '{
                gsub(/\r/, "", $0);
                if (length($0) > 0) {
                    n = split($0, a, "#");
                    ip_full = a[1];
                    remark = a[2];

                    split(ip_full, b, ":");
                    pure_ip = b[1];

                    if (ip_full !~ /:/) {
                        output_head = ip_full ":443"
                    } else {
                        output_head = ip_full
                    }

                    if (n > 1) {
                        print output_head "#" remark " | " pure_ip
                    } else {
                        print output_head " | " pure_ip
                    }
                }
            }' > "$TMP_NEW"

            if [ ! -s "$TMP_NEW" ]; then
              echo "错误: 无法获取有效内容。"
              continue
            fi

            FILE_CHANGED=false
            if [ ! -f "$TARGET_FILE" ]; then
                FILE_CHANGED=true
                HAS_CHANGES=true
                echo "-> 发现新文件"
            else
                sed '1d;$d' "$TARGET_FILE" > "$TMP_OLD"
                if ! diff -q "$TMP_OLD" "$TMP_NEW" > /dev/null; then
                    FILE_CHANGED=true
                    HAS_CHANGES=true
                    echo "-> 内容已更新"
                fi
            fi

            if [ "$FILE_CHANGED" = true ]; then
              # --- 修改：首行加入动态地区变量 $REGION ---
              echo "saas.sin.fan:443#▼ 优选IP $REGION | $BJ_TIME | YouTube@真香定律" > "$TARGET_FILE"
              cat "$TMP_NEW" >> "$TARGET_FILE"
              echo "bestcf.030101.xyz:443#▲ 优选IP | 分享优选网 bestcf.pages.dev | 感谢Gslege" >> "$TARGET_FILE"
            fi
            
            rm -f "$TMP_NEW" "$TMP_OLD"
          done

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add gslege/
            git commit -m "Gslege $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
          fi