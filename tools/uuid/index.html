<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>UUID v4 Generator</title> <style> :root { --matrix-green: #00ff41; --bg-black: #000000; --font-stack: "SF Mono", "Segoe UI Mono", "Roboto Mono", "Menlo", "Courier New", monospace; } * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; } body { background-color: var(--bg-black); color: var(--matrix-green); font-family: var(--font-stack); height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 80px 15px; overflow: hidden; } .page-header { display: flex; align-items: baseline; justify-content: center; text-shadow: 0 0 12px var(--matrix-green); white-space: nowrap; } .header-main { font-size: clamp(2.5rem, 10vw, 5rem); line-height: 1; } .header-main sub { font-size: 0.45em; margin-left: 4px; vertical-align: -0.1em; opacity: 0.8; } .main-content { width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; } .terminal-container { width: min(37ch, 95vw); display: flex; justify-content: flex-start; align-items: center; margin-bottom: 80px; font-size: calc(min(37ch, 95vw) / 22); font-weight: normal; min-height: 1.2em; } @media (min-width: 1200px) { .terminal-container { font-size: 3.5rem; width: 37ch; } } #uuid-display { white-space: nowrap; text-shadow: 0 0 15px var(--matrix-green); } .cursor { display: inline-block; width: 2px; height: 1.1em; background-color: var(--matrix-green); margin-left: 2px; display: none; } .cursor.active { display: inline-block; animation: cmd-blink 0.4s steps(2, start) infinite; } @keyframes cmd-blink { to { visibility: hidden; } } .controls { display: flex; gap: 20px; } button { background: transparent; color: var(--matrix-green); border: 2px solid var(--matrix-green); width: 160px; height: 55px; font-size: 1.1rem; font-family: var(--font-stack); font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; outline: none; } button:active { background: var(--matrix-green); color: var(--bg-black); box-shadow: 0 0 20px var(--matrix-green); } @media (hover: hover) { button:hover { background: var(--matrix-green); color: var(--bg-black); box-shadow: 0 0 15px var(--matrix-green); } } .footer-ad a { color: var(--matrix-green); text-decoration: none; font-size: 0.95rem; font-weight: 900; opacity: 0.6; } </style> </head> <body> <div class="page-header"> <span class="header-main">UUID<sub>v4</sub></span> </div> <div class="main-content"> <div class="terminal-container"> <span id="uuid-display"></span><span id="cursor" class="cursor"></span> </div> <div class="controls"> <button onclick="handleGenerate()">换一个</button> <button id="copy-btn" onclick="handleCopy()">复制UUID</button> </div> </div> <div class="footer-ad"> <a href="https://www.youtube.com/@zhenxiangdinglv" target="_blank">YouTube @真香定律</a> </div> <script> const displayEl = document.getElementById('uuid-display'); const cursorEl = document.getElementById('cursor'); const copyBtn = document.getElementById('copy-btn'); let isTyping = false; function generateUUID() { if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID(); const buf = new Uint8Array(16); crypto.getRandomValues(buf); buf[6] = (buf[6] & 0x0f) | 0x40; buf[8] = (buf[8] & 0x3f) | 0x80; return [...buf].map((b, i) => { const hex = b.toString(16).padStart(2, '0'); return [4, 6, 8, 10].includes(i) ? '-' + hex : hex; }).join(''); } async function startTypingEffect(text) { if (isTyping) return; isTyping = true; displayEl.textContent = ''; cursorEl.classList.add('active'); for (const char of text) { displayEl.textContent += char; await new Promise(r => setTimeout(r, 20)); } isTyping = false; cursorEl.classList.remove('active'); } function handleGenerate() { if (isTyping) return; startTypingEffect(generateUUID()); copyBtn.textContent = '复制UUID'; } function handleCopy() { if (isTyping || !displayEl.textContent) return; navigator.clipboard.writeText(displayEl.textContent).then(() => { copyBtn.textContent = '成功复制'; setTimeout(() => { copyBtn.textContent = '复制UUID'; }, 1500); }); } window.onload = handleGenerate; </script> </body> </html>
