<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloudflare JS混淆工具</title>
    <script src="index.browser.js"></script>
    <!--  <script src="jszip.min.js"></script> -->
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --border-color: #333333;
            --primary-blue: #2196f3;
        }

        /* 基础重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        h2 { text-align: center; margin-bottom: 20px; font-size: 1.4rem; }

        #drop-zone { 
            border: 2px dashed var(--border-color); 
            padding: 40px 15px;
            text-align: center; 
            cursor: pointer; 
            background-color: rgba(255,255,255,0.02);
            border-radius: 8px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }

        #drop-zone.dragover { border-color: var(--primary-blue); background-color: rgba(33,150,243,0.05); }

        .dz-icon { font-size: 32px; margin-bottom: 10px; }
        .dz-text { color: #888; font-size: 14px; }

        #file-info { display: none; text-align: center; width: 100%; }
        #filename-text { color: var(--primary-blue); font-weight: bold; font-size: 15px; margin-top: 8px; padding: 0 5px; }

        .actions { margin-top: 20px; }

        .config-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            color: #888;
            transition: color 0.2s;
        }

        .radio-label input {
            margin-right: 2px;
            cursor: pointer;
            accent-color: var(--primary-blue);
        }

        .radio-label:hover { color: var(--primary-blue); }

        button { 
            width: 100%;
            padding: 14px; 
            background-color: var(--primary-blue); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled { background-color: #333; color: #666; cursor: not-allowed; }
        
        .footer-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            text-align: center;
        }

        .footer-link:hover {
            color: var(--primary-blue);
            text-decoration: underline;
        }        
    </style>
</head>
<body>

    <div class="main-container">
        <h2>Cloudflare JS混淆工具</h2>
        
        <div id="drop-zone">
            <div id="dz-prompt">
                <div class="dz-icon">📄</div>
                <div class="dz-text">点击这里选择 或 直接拖入 .js明文源码文件</div>
            </div>
            
            <div id="file-info">
                <div class="dz-icon">📄</div>
                <div id="filename-text"></div>
            </div>
        </div>
        
        <input type="file" id="file-input" accept=".js" style="display: none;">

        <div class="actions">
            <div class="config-selector">
                <label class="radio-label">
                    <input type="radio" name="ob-level" value="weak" checked>
                    <span>弱混淆(推荐)</span>
                </label>
                <label class="radio-label">
                    <input type="radio" name="ob-level" value="strong">
                    <span>强混淆(CPU耗时约8ms)</span>
                </label>
            </div>

            <button id="process-btn" disabled>混淆并下载</button>
            <br>
            <a href="https://www.youtube.com/@zhenxiangdinglv" target="_blank" class="footer-link">YouTube@真香定律</a>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const dzPrompt = document.getElementById('dz-prompt');
        const fileInfo = document.getElementById('file-info');
        const filenameText = document.getElementById('filename-text');
        const fileInput = document.getElementById('file-input');
        const processBtn = document.getElementById('process-btn');
        let selectedFile = null;

        // 基础事件
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            dropZone.addEventListener(name, e => { e.preventDefault(); e.stopPropagation(); });
        });

        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
        ['dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, () => dropZone.classList.remove('dragover')));

        dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = e => handleFiles(e.target.files);

        function handleFiles(files) {
            if (files.length > 0 && files[0].name.endsWith('.js')) {
                selectedFile = files[0];
                dzPrompt.style.display = 'none';
                fileInfo.style.display = 'block';
                filenameText.innerText = selectedFile.name;
                processBtn.disabled = false;
                dropZone.style.borderColor = 'var(--primary-blue)';
            }
        }
        
        // 1. 增加下载前的类型检查和更好的 iOS 兼容性支持
        processBtn.onclick = () => {
            if (!selectedFile) return;
            
            // 显示处理中状态，防止重复点击
            processBtn.disabled = true;
            processBtn.innerText = "处理中...";
        
            const reader = new FileReader();
            const level = document.querySelector('input[name="ob-level"]:checked').value;
        
            reader.onload = async (e) => {
                try {
                    const config = {
                        compact: true,
                        renameGlobals: true, 
                        identifierNamesGenerator: 'hexadecimal', 
                        unicodeEscapeSequence: true, 
                        numbersToExpressions: true,
                        stringArray: true,
                        stringArrayEncoding: ['base64'],
                        stringArrayThreshold: 1,
                        controlFlowFlattening: level === 'strong',
                        simplify: level === 'strong'
                    };
        
                    // 注意：如果库没加载成功会报错
                    if (typeof JavaScriptObfuscator === 'undefined') {
                        throw new Error("混淆库加载失败，请检查网络");
                    }
        
                    const obfuscationResult = JavaScriptObfuscator.obfuscate(e.target.result, config);
                    const obfuscatedCode = obfuscationResult.getObfuscatedCode();
        
                    // 增强型下载逻辑
                    const blob = new Blob([obfuscatedCode], { type: 'application/javascript;charset=utf-8' });
                    const url = window.URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = '_worker.js';
                    
                    document.body.appendChild(a);
                    a.click();
                    
                    // 延迟移除和释放内存，对部分移动端浏览器更稳健
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                        processBtn.disabled = false;
                        processBtn.innerText = "混淆并下载";
                    }, 100);
        
                } catch (err) {
                    console.error(err);
                    alert("错误: " + err.message);
                    processBtn.disabled = false;
                    processBtn.innerText = "混淆并下载";
                }
            };
            reader.readAsText(selectedFile);
        };        
    </script>
</body>
</html>
