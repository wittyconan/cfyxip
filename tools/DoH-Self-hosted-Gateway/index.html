<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway 自建 DoH 教程</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --step-num-bg: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 600px);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .sub-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* EDT 风格卡片 */
        .step-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .step-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .step-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 12px;
        }

        .step-number {
            background: var(--step-num-bg);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .step-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }

        .step-content {
            color: var(--text-muted);
            font-size: 0.95rem;
            padding-left: 40px;
        }

        .link-btn {
            color: var(--accent-blue);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent-blue);
            transition: 0.2s;
        }

        .link-btn:hover {
            opacity: 0.8;
        }

        .img-container {
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
        }

        .img-container img {
            width: 100%;
            display: block;
            opacity: 0.9;
        }

        .highlight {
            color: #e2e8f0;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DoH 自建</h1>
        <div class="sub-title">白嫖 CLOUDFLARE ZERO TRUST 免费服务</div>
    </header>

    <!-- 步骤 1 -->
    <div class="step-card">
        <div class="step-header">
            <div class="step-number">1</div>
            <div class="step-title">访问Cloudflare</div>
        </div>
        <div class="step-content">
            点击 <a href="https://dash.cloudflare.com/" target="_blank" class="link-btn">https://dash.cloudflare.com/</a> 进入 Cloudflare 管理面板
        </div>
    </div>

    <!-- 步骤 2 -->
    <div class="step-card">
        <div class="step-header">
            <div class="step-number">2</div>
            <div class="step-title">路径</div>
        </div>
        <div class="step-content">
            通过左侧导航栏依次找到：<br><br>
            <span class="highlight">保护和连接</span> – <span class="highlight">Zero Trust</span> – <span class="highlight">网络</span> – <span class="highlight">解析程序和代理</span> – <span class="highlight">添加位置</span>
        </div>
    </div>

    <!-- 步骤 3 -->
    <div class="step-card">
        <div class="step-header">
            <div class="step-number">3</div>
            <div class="step-title">创建DoH</div>
        </div>
        <div class="step-content">
            随便输入一个名称 – 勾选 <span class="highlight">DoH</span> – 点击继续 – 点击完成 – <span style="color: var(--accent-blue);">最后点击 复制 DoH 链接</span>
            <div class="img-container">
                <!-- 这里替换成你的图片链接 -->
                <img src="1.png" alt="Gateway DoH 配置示意图" onerror="this.alt='此处为步骤3配置示意图';">
            </div>
        </div>
    </div>

    <footer>
        YouTube 真香定律
    </footer>
</div>

</body>
</html>
